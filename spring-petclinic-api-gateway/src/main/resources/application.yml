spring:
  application:
    name: api-gateway

  # TEMP: disable config server for Docker/local testing stability
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}

  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - name: CircuitBreaker
              args:
                name: defaultCircuitBreaker
                fallbackUri: forward:/fallback
            - name: Retry
              args:
                retries: 1
                statuses: SERVICE_UNAVAILABLE
                methods: GET,POST

          routes:
            - id: vets-service
              uri: http://vets-service:8080
              predicates:
                - Path=/api/vet/**
              filters:
                - StripPrefix=2

            - id: visits-service
              uri: http://visits-service:8080
              predicates:
                - Path=/api/visit/**
              filters:
                - StripPrefix=2

            - id: customers-service
              uri: http://customers-service:8080
              predicates:
                - Path=/api/customer/**
              filters:
                - StripPrefix=2

            - id: genai-service
              uri: http://genai-service:8080
              predicates:
                - Path=/api/genai/**
              filters:
                - StripPrefix=2
                - name: CircuitBreaker
                  args:
                    name: genaiCircuitBreaker
                    fallbackUri: forward:/fallback

  reactor:
    context-propagation: auto
